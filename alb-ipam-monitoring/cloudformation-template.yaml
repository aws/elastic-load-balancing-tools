Description: 'ALB IPAM Monitoring Solution - This CloudFormation template deploys a solution that monitors IP address usage for Application Load Balancers (ALB) that have VPC IPAM (IP Address Management) pools enabled. It automatically discovers all IPAM-enabled ALBs in your AWS account, performs DNS lookups using the "all." prefix to get the IP addresses associated with each ALB, and validates these IPs against the expected IPAM pool CIDR blocks to detect any foreign IPs that fall outside the designated ranges. The function then publishes two custom CloudWatch metrics: IPAddressCount (total unique IPs per ALB) and ForeignIPDetected (count of IPs outside IPAM pool CIDRs), enabling the monitoring of IP consumption trends, and detecting potential client impact when unexpected IP addresses appear outside of the managed IPAM pools.'

AWSTemplateFormatVersion: '2010-09-09'

Mappings:
  Solution:
    Info:
      Version: '1.7'

Conditions:
  EnableSNSNotifications: !Not [!Equals [!Ref SNSTopicArn, '']]
  IsRate1Minute: !Equals [!Ref ScheduleExpression, 'rate(1 minute)']
  IsRate5Minutes: !Equals [!Ref ScheduleExpression, 'rate(5 minutes)']
  IsRate10Minutes: !Equals [!Ref ScheduleExpression, 'rate(10 minutes)']

Parameters:
  ScheduleExpression:
    Type: String
    Default: 'rate(1 minute)'
    AllowedValues:
      - 'rate(1 minute)'
      - 'rate(5 minutes)'
      - 'rate(10 minutes)'
    Description: 'EventBridge schedule expression for Lambda execution frequency'
  
  EnableDebugLogging:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: 'Enable debug logging in Lambda function. Verbose, use for troubleshooting only.'
  
  SNSTopicArn:
    Type: String
    Default: ''
    AllowedPattern: '^(arn:aws:sns:[a-z0-9-]+:[0-9]{12}:[a-zA-Z0-9_-]+)?$'
    Description: 'Optional SNS Topic ARN for Alarm notifications (leave empty to disable notifications). Format: arn:aws:sns:region:account-id:topic-name'
    ConstraintDescription: 'Must be a valid SNS topic ARN or empty string'
  
  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: 'CloudWatch Log Group retention period in days.'

Resources:
  # Managed Policy for ALB IPAM Monitoring
  ALBIPAMMonitoringPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: ALBIPAMMonitoringPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - elasticloadbalancing:DescribeLoadBalancers
              - ec2:GetIpamPoolCidrs
            Resource: '*'
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: '*'
          - !If
            - EnableSNSNotifications
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref SNSTopicArn
            - !Ref 'AWS::NoValue'

  # IAM Role for Lambda Function
  ALBIPAMMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - !Ref ALBIPAMMonitoringPolicy

  # CloudWatch Log Group for Lambda Function
  ALBIPAMMonitoringLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: '/aws/lambda/ALB-IPAM-Monitoring'
      RetentionInDays: !Ref LogRetentionDays

  # Lambda Function
  ALBIPAMMonitoringFunction:
    Type: AWS::Lambda::Function
    DependsOn: ALBIPAMMonitoringLogGroup
    Properties:
      FunctionName: 'ALB-IPAM-Monitoring'
      Description: !Sub 
        - 'ALB IPAM Monitoring Lambda Function - Version ${Version}'
        - Version: !FindInMap [Solution, Info, Version]
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt ALBIPAMMonitoringRole.Arn
      ReservedConcurrentExecutions: 2
      Timeout: 60
      MemorySize: 128
      EphemeralStorage:
        Size: 512
      LoggingConfig:
        LogGroup: '/aws/lambda/ALB-IPAM-Monitoring'
      Environment:
        Variables:
          DEBUG_LOGGING: !Ref EnableDebugLogging
      Code:
        ZipFile: |
            """
            ALB IPAM Monitoring Solution Lambda Function
            """

            import boto3
            from botocore.config import Config
            import json
            import socket
            import time
            import ipaddress
            import os

            # Function to print debug logs
            def debug_print(*args, debug=None):
                """
                Print messages if debug mode is enabled.
                Args:
                    *args: Variable length argument list to print
                    debug (bool): Whether to print verbose logs (default: from environment variable)
                """
                if debug is None:
                    debug = os.environ.get('DEBUG_LOGGING', 'false').lower() == 'true'
                if debug:
                    print("DEBUG: ", *args)

            # Function to perform DNS lookup with retry logic and return the unique IPs from the response
            def get_unique_ips(domain, retries=3, delay=1):
                """
                Perform a DNS lookup for the domain using socket.getaddrinfo, and return a list of unique IP addresses from the response:
                    domain: The load balancer domain name with the .all prefix
                    retries (int): Maximum number of retry attempts
                    delay (int): Delay between retries in seconds
                """
                debug_print("Performing DNS lookup for: ", domain)
                for attempt in range(1, retries + 1):
                    try:
                        # Perform DNS lookup
                        result = socket.getaddrinfo(domain, None)
                        debug_print("DNS lookup result: ", result)
                        
                        # Extract unique IP addresses from the result
                        ip_addresses = set()
                        for entry in result:
                            ip = entry[4][0]  # Extract IP address from the tuple
                            ip_addresses.add(ip)
                        
                        unique_ips = list(ip_addresses)
                        debug_print("Unique IP addresses found: ", unique_ips)
                        return unique_ips
                        
                    except Exception as e:
                        print(f"Attempt {attempt}/{retries} DNS lookup failed for {domain}: {e}")
                        if attempt < retries:
                            print(f"Retrying in {delay} seconds...")
                            time.sleep(delay)
                        else:
                            print("Max retries reached. DNS lookup failed.")
                            return []

            def check_foreign_ips(ip_list, cidr_blocks):
                """
                Check if any IPs are outside the expected CIDR blocks (foreign IPs)
                Args:
                    ip_list (list): List of IP addresses to check
                    cidr_blocks (list): List of CIDR blocks to validate against
                Returns:
                    list: List of foreign IP addresses
                """
                debug_print(f"Checking {len(ip_list)} IPs against {len(cidr_blocks)} CIDR blocks")
                
                if not cidr_blocks:
                    debug_print("No CIDR blocks provided, all IPs considered foreign")
                    return ip_list
                
                foreign_ips = []
                
                # Convert CIDR blocks to network objects
                networks = []
                for cidr in cidr_blocks:
                    try:
                        networks.append(ipaddress.ip_network(cidr, strict=False))
                    except ValueError as e:
                        debug_print(f"Invalid CIDR block {cidr}: {e}")
                        continue
                
                # Check each IP against all networks
                for ip_str in ip_list:
                    try:
                        ip = ipaddress.ip_address(ip_str)
                        is_foreign = True
                        
                        for network in networks:
                            if ip in network:
                                is_foreign = False
                                break
                        
                        if is_foreign:
                            foreign_ips.append(ip_str)
                            debug_print(f"Foreign IP detected: {ip_str}")
                        else:
                            debug_print(f"IP {ip_str} is within expected CIDR blocks")
                            
                    except ValueError as e:
                        debug_print(f"Invalid IP address {ip_str}: {e}")
                        foreign_ips.append(ip_str)  # Treat invalid IPs as foreign
                
                return foreign_ips

            def publish_metric(cloudwatch_client, LoadBalancerArn, metric_value, metric_name):
                """
                Publish a metric to CloudWatch for the Application Load Balancer
                Args:
                    cloudwatch_client: The CloudWatch client (with native boto3 retry configured)
                    LoadBalancerArn (str): The ARN of the load balancer
                    metric_value (int): The metric value to publish
                    metric_name (str): The name of the metric
                Returns:
                    bool: True if successful, False otherwise
                """
                try:
                    response = cloudwatch_client.put_metric_data(
                        Namespace='ELB/IPAM-Monitoring',
                        MetricData=[
                            {
                                'MetricName': metric_name,
                                'Dimensions': [
                                    {
                                        'Name': 'LoadBalancerArn',
                                        'Value': LoadBalancerArn
                                    }
                                ],
                                'Value': metric_value,
                                'Unit': 'Count'
                            }
                        ]
                    )
                    debug_print(f"Successfully published {metric_name} metric: {metric_value} for ALB: {LoadBalancerArn}")
                    return True
                except Exception as e:
                    print(f"Failed to publish {metric_name} metric: {e}")
                    return False

            def get_ipam_pool_cidrs(ec2_client, ipam_pool_id):
                """
                Get CIDR blocks for an IPAM pool
                Args:
                    ec2_client: The EC2 client (with native boto3 retry configured)
                    ipam_pool_id (str): The IPAM pool ID
                Returns:
                    list: List of CIDR blocks or empty list if failed
                """
                try:
                    response = ec2_client.get_ipam_pool_cidrs(IpamPoolId=ipam_pool_id)
                    cidrs = []
                    for cidr_info in response.get('IpamPoolCidrs', []):
                        if cidr_info.get('State') == 'provisioned':
                            cidrs.append(cidr_info['Cidr'])
                    
                    debug_print(f"Retrieved {len(cidrs)} CIDR blocks for pool {ipam_pool_id}: {cidrs}")
                    return cidrs
                except Exception as e:
                    print(f"Failed to get IPAM pool CIDRs: {e}")
                    return []

            def lambda_handler(event, context):             
                # Define retry logic for boto3 aws clients
                retry_config = Config(
                    retries={
                        'max_attempts': 10,
                        'mode': 'adaptive'
                    }
                )
                # Initialize aws clients
                elbv2 = boto3.client('elbv2', config=retry_config)
                cloudwatch = boto3.client('cloudwatch', config=retry_config)
                ec2 = boto3.client('ec2', config=retry_config)
                debug_print(f'boto3 version: {boto3.__version__}')
                
                try:
                    # Get all load balancers
                    response = elbv2.describe_load_balancers()
                    debug_print("elbv2.describe_load_balancers API response: ", json.dumps(response, indent=4, sort_keys=True, default=str))
                    
                    # Filter for ALBs with IPAM enabled
                    ipam_albs = []
                    for lb in response.get('LoadBalancers', []):
                        if lb.get('Type') == 'application' and 'IpamPools' in lb:
                            ipam_albs.append(lb)
                    debug_print("Filtering for IPAM enabled ALBs: ", json.dumps(ipam_albs, indent=4, default=str))
                    
                    if not ipam_albs:
                        return {
                            'statusCode': 200,
                            'body': "No IPAM-enabled ALBs found"
                        }
                    
                    # Process each IPAM-enabled ALB
                    success_count = 0
                    failure_count = 0
                    failed_albs = []
                    
                    for alb in ipam_albs:
                        DNSName = alb['DNSName']
                        LoadBalancerArn = alb['LoadBalancerArn']
                        # Create "all." prefixed domain name
                        all_dns_name = f"all.{DNSName}"
                        # Perform DNS lookup
                        ip_list = get_unique_ips(all_dns_name)
                        
                        if not ip_list:
                            failure_count += 1
                            failed_albs.append(LoadBalancerArn)
                            continue
                            
                        # Count the unique IPs
                        ip_count = len(ip_list)
                        
                        # IPAM Pool logic
                        ipam_pool_data = alb.get('IpamPools', [])
                        
                        # Get all CIDR blocks from all IPAM pools associated with this ALB
                        all_cidrs = []
                        
                        # Extract pool IDs from the dictionary values
                        pool_ids = []
                        for key, value in ipam_pool_data.items():
                            if key in ['Ipv4IpamPoolId', 'Ipv6IpamPoolId', 'IpamPoolId'] and value:
                                pool_ids.append(value)
                                debug_print(f"Found pool ID from key '{key}': {value}")
                        
                        # Log LB ARN, unique IP addresses, and IPAM pool IDs
                        print(f"ALB: {LoadBalancerArn}, IP count: {ip_count}, IP address list: {ip_list}, IPAM pools: {pool_ids}")
                        
                        # Process each pool ID
                        for ipam_pool_id in pool_ids:
                            if ipam_pool_id and ipam_pool_id.startswith('ipam-pool-'):
                                pool_cidrs = get_ipam_pool_cidrs(ec2, ipam_pool_id)
                                all_cidrs.extend(pool_cidrs)
                                debug_print(f"IPAM Pool {ipam_pool_id} CIDRs: {pool_cidrs}")
                            else:
                                debug_print(f"Invalid IPAM pool ID format: {ipam_pool_id}")
                        
                        # Check for foreign IPs
                        foreign_ips = check_foreign_ips(ip_list, all_cidrs)
                        
                        if foreign_ips:
                            print(f"ALERT: Foreign IPs detected for ALB {LoadBalancerArn}: {foreign_ips}, Expected CIDR blocks: {all_cidrs}. Add more free CIDR space to IPAM pool and reach out to AWS Support to remove the non-IPAM IPs from your Load Balancer.")
                            # Publish foreign IP metric
                            foreign_ip_count = len(foreign_ips)
                            publish_metric(cloudwatch, LoadBalancerArn, foreign_ip_count, 'ForeignIPDetected')
                        else:
                            print(f"INFO: All IPs for ALB {LoadBalancerArn} are within expected CIDR blocks")
                            publish_metric(cloudwatch, LoadBalancerArn, 0, 'ForeignIPDetected')
                        
                        # Publish metric
                        if publish_metric(cloudwatch, LoadBalancerArn, ip_count, 'IPAddressCount'):
                            success_count += 1
                        else:
                            failure_count += 1
                            failed_albs.append(LoadBalancerArn)
                    
                    # Return appropriate status based on results
                    if failure_count == 0:
                        message = f"Succeeded in processing all {success_count} IPAM-enabled ALBs."
                        print(message)
                        return {
                            'statusCode': 200,
                            'body': message
                        }
                    elif success_count == 0:
                        message = f"WARNING: Failure during processing all {failure_count} IPAM-enabled ALBs."
                        print(f"{message}. Failed ALBs: {failed_albs}")
                        return {
                            'statusCode': 500,
                            'body': message
                        }
                    else:
                        message = f"WARNING: Partial Success during load balancer processing: {success_count} succeeded, {failure_count} failed"
                        print(f"{message}. Failed ALBs: {failed_albs}")
                        return {
                            'statusCode': 207,
                            'body': message
                        }
                        
                except Exception as e:
                    print(f"Lambda execution failed: {e}")
                    return {
                        'statusCode': 500,
                        'body': f"Lambda execution failed: {str(e)}"
                    }

  # EventBridge Rule for Lambda Scheduling
  ALBIPAMMonitoringScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: 'ALB-IPAM-Monitoring-Schedule'
      Description: 'Schedule for ALB IPAM monitoring Lambda function'
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt ALBIPAMMonitoringFunction.Arn
          Id: 'ALBIPAMMonitoringTarget'

  # Permission for EventBridge to invoke Lambda
  ALBIPAMMonitoringLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ALBIPAMMonitoringFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ALBIPAMMonitoringScheduleRule.Arn

  # CloudWatch Alarm for ForeignIPDetected using Metrics Insights Query
  ForeignIPDetectedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ALB-IPAM-Monitoring-Foreign-IP-Detected-${AWS::Region}'
      AlarmDescription: 'Alarm triggered when Foreign IPs are detected for IPAM enabled Application Load Balancers (ALB)'
      Metrics:
        - Id: 'm1'
          Expression: 'SELECT MAX(ForeignIPDetected) FROM SCHEMA("ELB/IPAM-Monitoring", LoadBalancerArn)'
          Label: 'Max ForeignIPDetected Across All IPAM enabled ALBs'
          Period: !If
            - IsRate1Minute
            - 60
            - !If
              - IsRate10Minutes
              - 600
              - 300
          ReturnData: true
      EvaluationPeriods: 2
      DatapointsToAlarm: 1
      Threshold: 0
      ComparisonOperator: 'GreaterThanThreshold'
      AlarmActions: !If
        - EnableSNSNotifications
        - [!Ref SNSTopicArn]
        - !Ref 'AWS::NoValue'
      OKActions: !If
        - EnableSNSNotifications
        - [!Ref SNSTopicArn]
        - !Ref 'AWS::NoValue'
      TreatMissingData: 'notBreaching'

  # CloudWatch Dashboard
  ALBIPAMMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: 'ALB-IPAM-Monitoring'
      DashboardBody: !Sub |
        {
            "widgets": [
                {
                    "type": "text",
                    "x": 0,
                    "y": 0,
                    "width": 12,
                    "height": 5,
                    "properties": {
                        "markdown": "In case your VPC IPAM Pool doesn’t have sufficient IP addresses available during Application Load Balancer (ALB) node replacement or scaling activity, the ALB will fall back on Amazon owned public IP addresses to ensure availability [1]. \n\nIf this solution detects an IPAM enabled ALB having a foreign IP address in DNS; free up or add more CIDR space to the respective IPAM pool [2], and reach out to AWS Support to remove the non-IPAM pool IP addresses from your Load Balancer [3].\n\n[1] ALB IPAM IP address pools - https://docs.aws.amazon.com/elasticloadbalancing/latest/application/application-load-balancers.html#ip-pools  \n[2] VPC IPAM - https://docs.aws.amazon.com/vpc/latest/ipam  \n[3] AWS Support Case - https://docs.aws.amazon.com/awssupport/latest/user/case-management.html",
                        "background": "transparent"
                    }
                },
                {
                    "type": "alarm",
                    "x": 12,
                    "y": 0,
                    "width": 12,
                    "height": 5,
                    "properties": {
                        "title": "Alarms",
                        "alarms": [
                            "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:ALB-IPAM-Monitoring-Foreign-IP-Detected-${AWS::Region}"
                        ]
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 5,
                    "width": 24,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT MAX(IPAddressCount) FROM \"ELB/IPAM-Monitoring\" GROUP BY LoadBalancerArn", "label": "IPAddressCount", "id": "q1", "region": "${AWS::Region}", "period": 60 } ]
                        ],
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "period": 60,
                        "stat": "Average",
                        "title": "ALB IP Address Count Over Time",
                        "yAxis": {
                            "left": {
                                "showUnits": false,
                                "label": "Count"
                            },
                            "right": {
                                "showUnits": false
                            }
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 11,
                    "width": 24,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT MAX(ForeignIPDetected) FROM SCHEMA(\"ELB/IPAM-Monitoring\", LoadBalancerArn) GROUP BY LoadBalancerArn", "label": "ForeignIPDetected", "id": "q1", "region": "${AWS::Region}", "period": 60, "stat": "Maximum" } ]
                        ],
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "title": "Foreign IP Detection",
                        "period": 60,
                        "stat": "Maximum",
                        "yAxis": {
                            "left": {
                                "showUnits": false,
                                "label": "Count"
                            },
                            "right": {
                                "showUnits": false
                            }
                        },
                        "annotations": {
                            "horizontal": [
                                {
                                    "color": "#d62728",
                                    "label": "Alarm Threshold",
                                    "value": 1
                                }
                            ]
                        }
                    }
                },
                {
                    "type": "log",
                    "x": 0,
                    "y": 17,
                    "width": 24,
                    "height": 6,
                    "properties": {
                        "query": "SOURCE '/aws/lambda/ALB-IPAM-Monitoring'\n| fields @timestamp, @message\n| filter @message like /ALERT:/ or @message like /WARNING:/ or @message like /INFO:/\n| sort @timestamp desc\n| limit 100",
                        "region": "${AWS::Region}",
                        "title": "Recent Foreign IP Detection Logs",
                        "view": "table"
                    }
                }
            ]
        }

Outputs:
  SolutionVersion:
    Description: 'Version of the ALB IPAM Monitoring solution'
    Value: !FindInMap [Solution, Info, Version]
  
  CloudWatchDashboardURL:
    Description: 'URL to access the CloudWatch dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=ALB-IPAM-Monitoring'